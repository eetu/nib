<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Resolve the persisted theme (light/dark/auto) to a concrete data-theme
         before first paint, so there's no flash of the wrong theme. The layout
         then keeps it live (and re-resolves 'auto' on system flips). -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem("nib:theme");
          var dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme =
            m === "light" || m === "dark" ? m : dark ? "dark" : "light";
        } catch (e) {
          /* storage/matchMedia unavailable — layout applies the default */
        }
      })();
    </script>
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="nib" />

    <title>nib</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
