name: Deploy demo to GitHub Pages

# The live demo is the same pure-SPA build, just served from a subdirectory
# (a project page lives at https://<owner>.github.io/<repo>/). The Pages build
# sets BASE_PATH so asset URLs resolve under /nib; every other build (dev, a
# future Rust backend) stays at the root. See frontend/svelte.config.js.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yaml"
  workflow_dispatch:

# Allow one concurrent deploy; don't cancel an in-progress one (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: frontend/.node-version

      # Vendored yarn (no corepack) — invoke the committed release via node.
      - name: Install dependencies
        run: node .yarn/releases/yarn-*.cjs install --immutable

      - name: Build (base path = /nib)
        env:
          BASE_PATH: "/${{ github.event.repository.name }}"
        run: node .yarn/releases/yarn-*.cjs build

      # The SPA fallback is index.html (the family backend contract). GitHub
      # Pages serves 404.html for unmatched paths, so mirror it there too — that
      # makes a deep link / hard refresh under /nib/ resolve to the app.
      - name: SPA fallback for Pages
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
