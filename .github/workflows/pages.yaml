name: Deploy demo to GitHub Pages

# The live demo is the same pure-SPA build, just served from a subdirectory
# (a project page lives at https://<owner>.github.io/<repo>/). The Pages build
# sets BASE_PATH so asset URLs resolve under /nib; every other build (dev, a
# future Rust backend) stays at the root. See frontend/svelte.config.js.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/pages.yaml"
  workflow_dispatch:

# Allow one concurrent deploy; don't cancel an in-progress one (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # The Rust `nib-core` crate compiles to WASM and is consumed by the frontend via a
      # link: dep (../core/pkg). Build it BEFORE `yarn install` so the link target exists.
      # ubuntu-latest ships rustup + stable, so we only add the wasm target + wasm-pack.
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      # Optional size pass — a binaryen failure must not break the deploy (the build step
      # skips wasm-opt if it's absent and ships the cargo-optimized .wasm).
      - name: Install binaryen (wasm size pass)
        run: sudo apt-get update && sudo apt-get install -y binaryen
        continue-on-error: true

      - name: Build the Rust core → WASM (+ size-optimize)
        working-directory: ${{ github.workspace }}
        run: |
          wasm-pack build core --target web
          # Size-optimize with the module's OWN feature set — NOT --all-features, which lets
          # binaryen re-encode the type section in a GC/reference-types form that browsers'
          # streaming decoder rejects ("unknown type form"), shipping a .wasm the browser can't
          # load. Enable only the baseline features rustc emits (bulk-memory, sign-ext, …). If
          # wasm-opt is missing OR errors, fall back to the cargo-optimized .wasm so the deploy
          # never ships a broken core.
          if command -v wasm-opt >/dev/null 2>&1; then
            cp core/pkg/nib_core_bg.wasm /tmp/nib_core_unopt.wasm
            if ! wasm-opt -Oz \
                --enable-bulk-memory --enable-bulk-memory-opt --enable-mutable-globals \
                --enable-sign-ext --enable-nontrapping-float-to-int \
                core/pkg/nib_core_bg.wasm -o core/pkg/nib_core_bg.wasm; then
              echo "wasm-opt failed — reverting to the cargo-optimized .wasm"
              cp /tmp/nib_core_unopt.wasm core/pkg/nib_core_bg.wasm
            fi
          else
            echo "wasm-opt (binaryen) not found — shipping the cargo-optimized .wasm"
          fi

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: frontend/.node-version

      # Vendored yarn (no corepack) — invoke the committed release via node.
      - name: Install dependencies
        run: node .yarn/releases/yarn-*.cjs install --immutable

      - name: Build (base path = /nib)
        env:
          BASE_PATH: "/${{ github.event.repository.name }}"
        run: node .yarn/releases/yarn-*.cjs build

      # The SPA fallback is index.html (the family backend contract). GitHub
      # Pages serves 404.html for unmatched paths, so mirror it there too — that
      # makes a deep link / hard refresh under /nib/ resolve to the app.
      - name: SPA fallback for Pages
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
